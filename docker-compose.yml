services:
  casdoor-db:
    image: mysql:8.0
    container_name: casdoor-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: casdoor
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - casdoor_db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  casdoor:
    image: casbin/casdoor:latest
    container_name: casdoor
    restart: unless-stopped
    depends_on:
      - casdoor-db
    entrypoint: /bin/sh -c './server --createDatabase=true'
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./conf/casdoor:/conf
    ports:
      - "8000:8000"

  casibase-db:
    image: mysql:8.0
    container_name: casibase-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: casibase
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - casibase_db_data:/var/lib/mysql
    ports:
      - "3308:3306"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        mc mb --ignore-existing local/casibase
        mc anonymous set none local/casibase

  openmeter-kafka:
    image: confluentinc/cp-kafka:8.0.3
    container_name: openmeter-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: ca497efe-9f82-4b84-890b-d9969a9a2e1c
      KAFKA_BROKER_ID: 0
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@openmeter-kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://openmeter-kafka:9092
      KAFKA_LISTENERS: INTERNAL://openmeter-kafka:9092,CONTROLLER://openmeter-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_MESSAGE_TIMESTAMP_AFTER_MAX_MS: 9223372036854775807
    volumes:
      - openmeter_kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "unset JMX_PORT KAFKA_JMX_OPTS; kafka-topics --bootstrap-server openmeter-kafka:9092 --list",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  openmeter-clickhouse:
    image: clickhouse/clickhouse-server:25.12.3-alpine
    container_name: openmeter-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      CLICKHOUSE_DB: openmeter
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - openmeter_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://openmeter-clickhouse:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  openmeter-redis:
    image: redis:7.4.7
    container_name: openmeter-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--maxmemory",
        "50mb",
        "--maxmemory-policy",
        "noeviction",
        "--maxmemory-samples",
        "10",
      ]
    volumes:
      - openmeter_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 30

  openmeter-postgres:
    image: postgres:14.20-alpine3.23
    container_name: openmeter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - openmeter_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "postgres", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 30

  openmeter:
    image: ghcr.io/openmeterio/openmeter:latest
    container_name: openmeter
    restart: unless-stopped
    command: openmeter --address 0.0.0.0:8888 --config /etc/openmeter/config.yaml
    depends_on:
      openmeter-kafka:
        condition: service_healthy
      openmeter-clickhouse:
        condition: service_healthy
      openmeter-postgres:
        condition: service_healthy
    volumes:
      - ./conf/openmeter:/etc/openmeter:ro
    ports:
      - "48888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://openmeter:8888/api/v1/debug/metrics"]
      interval: 5s
      timeout: 3s
      retries: 30

  openmeter-sink-worker:
    image: ghcr.io/openmeterio/openmeter:latest
    container_name: openmeter-sink-worker
    restart: unless-stopped
    command: openmeter-sink-worker --config /etc/openmeter/config.yaml
    depends_on:
      openmeter:
        condition: service_healthy
      openmeter-kafka:
        condition: service_healthy
      openmeter-clickhouse:
        condition: service_healthy
      openmeter-redis:
        condition: service_healthy
    volumes:
      - ./conf/openmeter:/etc/openmeter:ro

  openmeter-balance-worker:
    image: ghcr.io/openmeterio/openmeter:latest
    container_name: openmeter-balance-worker
    restart: unless-stopped
    command: openmeter-balance-worker --config /etc/openmeter/config.yaml
    depends_on:
      openmeter:
        condition: service_healthy
      openmeter-kafka:
        condition: service_healthy
      openmeter-clickhouse:
        condition: service_healthy
      openmeter-redis:
        condition: service_healthy
    volumes:
      - ./conf/openmeter:/etc/openmeter:ro

  d-ai-clickhouse:
    image: clickhouse/clickhouse-server:25.12.3-alpine
    container_name: d-ai-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      CLICKHOUSE_DB: d_ai_logs
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - d_ai_clickhouse_data:/var/lib/clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://d-ai-clickhouse:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  d-ai-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.142.0
    container_name: d-ai-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      d-ai-clickhouse:
        condition: service_healthy
    volumes:
      - ./conf/d-ai-otel-collector:/etc/otelcol-contrib:ro
      - ./d-ai/.d-ai-state/logs:/var/log/d-ai:ro
      - ./d-ai/.d-ai-state/otelcol:/var/lib/otelcol
    ports:
      - "4317:4317"
      - "4318:4318"

  casibase:
    image: casbin/casibase:latest
    container_name: casibase
    restart: unless-stopped
    depends_on:
      - casibase-db
      - casdoor
      - minio
    extra_hosts:
      - "casdoor.local:host-gateway"
    environment:
      driverName: mysql
      dataSourceName: root:123456@tcp(casibase-db:3306)/
      dbName: casibase
      copyrequestbody: "true"
      disablePreviewMode: "true"
      EnableDocs: "true"

      casdoorEndpoint: http://casdoor.local:8000
      clientId: ba3a96dbc430c5c6a22b
      clientSecret: 9228f4ce27971ca5c188cac7489dc0f304a122b6
      casdoorOrganization: built-in
      casdoorApplication: casibase
      redirectPath: /callback
    volumes:
      - ./conf/casibase:/conf
    ports:
      - "14000:14000"

volumes:
  casdoor_db_data:
  casibase_db_data:
  minio_data:
  openmeter_kafka_data:
  openmeter_clickhouse_data:
  openmeter_redis_data:
  openmeter_postgres_data:
  d_ai_clickhouse_data:
