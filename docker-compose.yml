services:
  casdoor-db:
    image: mysql:8.0
    container_name: casdoor-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: casdoor
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - casdoor_db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  casdoor:
    image: casbin/casdoor:latest
    container_name: casdoor
    restart: unless-stopped
    depends_on:
      - casdoor-db
    entrypoint: /bin/sh -c './server --createDatabase=true'
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./conf/casdoor:/conf
    ports:
      - "8000:8000"

  casibase-db:
    image: mysql:8.0
    container_name: casibase-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: casibase
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - casibase_db_data:/var/lib/mysql
    ports:
      - "3308:3306"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        mc mb --ignore-existing local/casibase
        mc anonymous set none local/casibase

  casibase:
    image: casbin/casibase:latest
    container_name: casibase
    restart: unless-stopped
    depends_on:
      - casibase-db
      - casdoor
      - minio
    extra_hosts:
      - "casdoor.local:host-gateway"
    environment:
      driverName: mysql
      dataSourceName: root:123456@tcp(casibase-db:3306)/
      dbName: casibase
      copyrequestbody: "true"
      disablePreviewMode: "true"
      EnableDocs: "true"

      casdoorEndpoint: http://casdoor.local:8000
      clientId: ba3a96dbc430c5c6a22b
      clientSecret: 9228f4ce27971ca5c188cac7489dc0f304a122b6
      casdoorOrganization: built-in
      casdoorApplication: casibase
      redirectPath: /callback
    volumes:
      - ./conf/casibase:/conf
    ports:
      - "14000:14000"

volumes:
  casdoor_db_data:
  casibase_db_data:
  minio_data:
